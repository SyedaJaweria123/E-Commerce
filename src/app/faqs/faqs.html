<div class="faqs-page">

  <h1 class="faqs-title">FAQS</h1>

  <div class="faqs-list">

    <div class="faq-category" *ngFor="let cat of categories">

      <!-- CATEGORY ROW -->
      <div class="cat-row" (click)="toggleCategory(cat.id)" [class.open]="openCategory === cat.id">
        <span class="cat-label">{{ cat.label }}</span>
        <div class="cat-icon">
          <svg *ngIf="openCategory !== cat.id" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <svg *ngIf="openCategory === cat.id" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </div>
      </div>

      <!-- INNER FAQS -->
      <div class="cat-content" *ngIf="openCategory === cat.id">
        <div class="inner-faq" *ngFor="let faq of cat.faqs">
          <div class="inner-q" (click)="toggleFaq(faq)">
            <strong>{{ faq.q }}</strong>
          </div>
          <div class="inner-a" *ngIf="faq.open">
            <p *ngFor="let line of faq.a.split('\n')">{{ line }}</p>
          </div>
        </div>
      </div>

    </div>

  </div>

</div>
