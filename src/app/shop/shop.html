<div class="shop-container">

  <div class="shop-header">
    <h2>Our Beauty Products</h2>
    <p class="shop-tagline">Premium Skincare Collection</p>
  </div>

  <div class="product-grid">
    <div class="sp-card" *ngFor="let p of products" (click)="openDetail(p)">

      <div class="sp-img-wrap">
        <img [src]="p.image" [alt]="p.name" loading="lazy">

        <div class="sp-overlay">
          <button class="sp-add-btn" (click)="addToCart(p); $event.stopPropagation()">
            ADD TO BAG
          </button>
          <button
            class="sp-heart-btn"
            (click)="toggleFav(p); $event.stopPropagation()"
            [class.sp-heart-active]="fav.isFav(p.name)"
          >
            <svg width="20" height="20" viewBox="0 0 24 24"
              [attr.fill]="fav.isFav(p.name) ? '#222' : 'none'"
              stroke="#222" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06
                       a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78
                       1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="sp-card-info">
        <h3 class="sp-name">{{ p.name }}</h3>
        <p class="sp-category">SKINCARE COLLECTION</p>
        <p class="sp-price">Rs.{{ p.price }}</p>
        <span class="sp-new-tag">NEW IN</span>
      </div>

    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     SMOOTH DETAIL MODAL
══════════════════════════════════════ -->
<div class="modal-backdrop" [class.active]="selectedProduct" (click)="closeDetail()">
  <div class="modal-box" (click)="$event.stopPropagation()" *ngIf="selectedProduct">

    <!-- CLOSE BUTTON -->
    <button class="modal-close-btn" (click)="closeDetail()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>

    <!-- LEFT — IMAGE -->
    <div class="modal-img-side">
      <img [src]="selectedProduct.image" [alt]="selectedProduct.name">

      <!-- FAV button on modal image -->
      <button
        class="modal-fav-btn"
        (click)="toggleFav(selectedProduct); $event.stopPropagation()"
        [class.modal-fav-active]="fav.isFav(selectedProduct.name)"
      >
        <svg width="20" height="20" viewBox="0 0 24 24"
          [attr.fill]="fav.isFav(selectedProduct.name) ? '#c0395f' : 'none'"
          [attr.stroke]="fav.isFav(selectedProduct.name) ? '#c0395f' : '#aaa'"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06
                   a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78
                   1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>
    </div>

    <!-- RIGHT — INFO -->
    <div class="modal-info-side">

      <span class="modal-tag">SKINCARE</span>
      <h2 class="modal-title">{{ selectedProduct.name }}</h2>
      <p class="modal-desc">{{ selectedProduct.description }}</p>

      <div class="modal-divider"></div>

      <!-- META TABLE -->
      <div class="modal-meta">
        <div class="modal-meta-row">
          <span class="meta-key">Skin Type</span>
          <span class="meta-val">All Skin Types</span>
        </div>
        <div class="modal-meta-row">
          <span class="meta-key">Volume</span>
          <span class="meta-val">50ml</span>
        </div>
        <div class="modal-meta-row">
          <span class="meta-key">Availability</span>
          <span class="meta-val meta-instock">
            <span class="instock-dot"></span> In Stock
          </span>
        </div>
      </div>

      <!-- PRICE + CART -->
      <div class="modal-footer">
        <div class="modal-price-wrap">
          <span class="modal-price">Rs.{{ selectedProduct.price | number:'1.0-0' }}</span>
        </div>
        <button class="modal-cart-btn" (click)="addToCart(selectedProduct); closeDetail()">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          Add to Cart
        </button>
      </div>

    </div>
  </div>
</div>
