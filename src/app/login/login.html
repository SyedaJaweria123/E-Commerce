<!-- LOGIN FORM ONLY — social buttons app.html mein hain -->
<div class="lf-wrap">

  <h2 class="lf-title">WELCOME</h2>
  <p class="lf-sub">Sign in to your account</p>

  <div class="lf-alert lf-error"   *ngIf="errorMsg">{{ errorMsg }}</div>
  <div class="lf-alert lf-success" *ngIf="successMsg">{{ successMsg }}</div>

  <form (ngSubmit)="onLogin()" class="lf-form">

    <div class="lf-field">
      <label class="lf-label">Email <span class="lf-req">*</span></label>
      <input
        type="email"
        [(ngModel)]="email"
        name="email"
        class="lf-input"
        placeholder="Enter your email"
        required/>
    </div>

    <div class="lf-field">
      <label class="lf-label">Password <span class="lf-req">*</span></label>
      <div class="lf-pass">
        <input
          [type]="showPass ? 'text' : 'password'"
          [(ngModel)]="password"
          name="password"
          class="lf-input"
          placeholder="Enter your password"
          required/>
        <button type="button" class="lf-eye" (click)="showPass = !showPass">
          <svg *ngIf="!showPass" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
          <svg *ngIf="showPass" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="lf-opts">
      <label class="lf-remember">
        <input type="checkbox" class="lf-chk"/> Remember me
      </label>
      <span class="lf-forgot">Forgot Password?</span>
    </div>

    <button type="submit" class="lf-btn" [disabled]="loading">
      <span *ngIf="!loading">LOGIN</span>
      <span *ngIf="loading" class="lf-spinner"></span>
    </button>

  </form>
</div>
